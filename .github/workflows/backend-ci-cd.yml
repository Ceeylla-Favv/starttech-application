name: Backend CI/CD

on:
  push:
    branches: [main]
    paths: ['backend/**']
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Download dependencies
        working-directory: backend
        run: go mod download

      - name: Run tests
        working-directory: backend
        run: go test ./... -v

      - name: Go vet
        working-directory: backend
        run: go vet ./...

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/starttech-backend:$IMAGE_TAG \
                       -t $REGISTRY/starttech-backend:latest \
                       ./backend
          docker push $REGISTRY/starttech-backend:$IMAGE_TAG
          docker push $REGISTRY/starttech-backend:latest

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/starttech-backend:${{ github.sha }}
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH

      - name: Rolling deploy via SSM
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          INSTANCE_IDS=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=starttech-backend" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[*].Instances[*].InstanceId" \
            --output text)

          if [ -z "$INSTANCE_IDS" ]; then
            echo "No running instances found yet — skipping deploy"
            exit 0
          fi

          for ID in $INSTANCE_IDS; do
            echo "Deploying to $ID..."
            aws ssm send-command \
              --instance-ids "$ID" \
              --document-name "AWS-RunShellScript" \
              --parameters commands="[
                'aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $REGISTRY',
                'docker pull $REGISTRY/starttech-backend:$IMAGE_TAG',
                'docker stop backend || true',
                'docker rm backend || true',
                'docker run -d --name backend --restart always -p 8080:8080 -e MONGO_URI=${{ secrets.MONGO_URI }} -e REDIS_HOST=${{ secrets.REDIS_HOST }} -e APP_ENV=production $REGISTRY/starttech-backend:$IMAGE_TAG'
              ]"
            sleep 30
          done

      - name: Health check
        run: |
          echo "Waiting for backend to be healthy..."
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              http://${{ secrets.ALB_DNS_NAME }}/health || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Backend is healthy"
              exit 0
            fi
            sleep 15
          done
          echo "Health check failed"
          exit 1